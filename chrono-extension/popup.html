<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>ChronoAI Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 200px;
      background: #0f0f0f;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .popup-container {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ─── Header ───────────────────── */

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .logo-text span {
      color: #8b5cf6;
    }

    /* ─── Status section ───────────── */

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.4);
    }

    .status-dot.disconnected {
      background: #525252;
    }

    .status-label {
      font-size: 13px;
      color: #a3a3a3;
    }

    .user-email {
      font-weight: 600;
      color: #e5e5e5;
    }

    /* ─── Info block ───────────────── */

    .info-block {
      background: #1a1a1a;
      border: 1px solid #262626;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .info-label {
      font-size: 12px;
      color: #737373;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .info-value {
      font-size: 13px;
      color: #d4d4d4;
    }

    .divider {
      height: 1px;
      background: #262626;
    }

    /* ─── Buttons ──────────────────── */

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #ffffff;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #1a1a1a;
      color: #d4d4d4;
      border: 1px solid #333333;
    }

    .btn-secondary:hover {
      background: #262626;
      border-color: #404040;
    }

    .btn-danger {
      background: transparent;
      color: #ef4444;
      border: 1px solid #3f1515;
      font-size: 13px;
      padding: 8px 14px;
    }

    .btn-danger:hover {
      background: #1c0a0a;
      border-color: #7f1d1d;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ─── Disconnected view ────────── */

    .disconnected-msg {
      font-size: 14px;
      color: #a3a3a3;
      line-height: 1.6;
    }

    /* ─── Footer ───────────────────── */

    .footer {
      font-size: 11px;
      color: #525252;
      text-align: center;
      padding-top: 4px;
    }

    /* ─── Utility ──────────────────── */

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="popup-container">

    <!-- Header -->
    <div class="header">
      <div class="logo-icon">C</div>
      <div class="logo-text">Chrono<span>AI</span></div>
    </div>

    <!-- ─── Connected State ─── -->
    <div id="connected-view" class="hidden">
      <div style="display:flex;flex-direction:column;gap:16px;">

        <div class="status-row">
          <div class="status-dot connected"></div>
          <span class="status-label">Connected as <span id="user-email" class="user-email"></span></span>
        </div>

        <div class="info-block">
          <div class="info-row">
            <span class="info-label">Last Sync</span>
            <span class="info-value" id="last-sync">Never synced</span>
          </div>
          <div class="divider"></div>
          <div class="info-row">
            <span class="info-label">Status</span>
            <span class="info-value" style="color:#22c55e;">Active</span>
          </div>
        </div>

        <div class="button-group">
          <button class="btn btn-secondary" id="btn-open">Open ChronoAI</button>
          <button class="btn btn-danger" id="btn-disconnect">Disconnect</button>
        </div>

      </div>
    </div>

    <!-- ─── Disconnected State ─── -->
    <div id="disconnected-view" class="hidden">
      <div style="display:flex;flex-direction:column;gap:16px;">

        <div class="status-row">
          <div class="status-dot disconnected"></div>
          <span class="status-label">Not connected</span>
        </div>

        <p class="disconnected-msg">
          Connect your ChronoAI account to start syncing your AI conversations automatically.
        </p>

        <button class="btn btn-primary" id="btn-signin">Sign in with ChronoAI</button>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">ChronoAI silently syncs your AI conversations</div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
